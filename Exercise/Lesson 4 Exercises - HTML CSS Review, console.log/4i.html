<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>paraAndButtons</title>
  <style>
    button.Add{
      background-color: yellow;
    }
    button.Buy{
      background-color: orange;
    }
  </style>
</head>
<body>

  <p>Adults Plain Cotton T-shirt</p>
  <p>Price: $7.99 </p>

  <button onclick="alert('Added');" class="Add">Add to cart</button>
  <button onclick="console.log('Loading...'); 
     alert('Purchased');" class="Buy">Buy now</button>
</body>
</html>
