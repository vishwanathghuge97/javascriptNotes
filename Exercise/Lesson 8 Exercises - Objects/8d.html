<body>
  <!-- 8d. Create a function 'comparePrice(product1, product2)', which takes 2
products (with 'name' and 'price' properties) and returns the product
that is less expensive. Create 2 products and try out the function. -->


<script>
function comparePrice(product1, product2) {
  if (product1.price < product2.price) {
    return product1;
  } else {
    return product2;
  }
}

const basketball = { name: 'basketball', price: 2095 };
const football = { name: 'football', price: 1500 };

console.log(comparePrice(basketball, football));
</script>
  
</body>
