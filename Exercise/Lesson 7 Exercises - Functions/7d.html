<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7d</title>
</head>
<body>
  <h1>Temp Converter</h1>
  <script>
    function convertToFahrenheit(celsius) {
      let fahrenheit = (celsius * 9 / 5) + 32;
      return fahrenheit;
    }

    const celsius = 25;
    console.log(convertToFahrenheit(celsius));
  </script>
</body>
</html>
